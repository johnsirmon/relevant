name: 🧠 Self-Improve (Promote Learnings)

on:
  workflow_dispatch:
  push:
    paths:
      - ".learnings/**"

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install openai

      - name: Promote learnings to copilot-instructions.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/promote_learnings.py

      - name: Commit updated instructions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/copilot-instructions.md .learnings/
          git diff --cached --quiet || git commit -m "chore: promote learnings to copilot-instructions [skip ci]"
          git push
